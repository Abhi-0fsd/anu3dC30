<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: Arial;
}

/* HEADER */
.back-header{
  background:#f5f5dc;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.left-header{
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn{
  color:#201d1f;
  font-size:20px;
  text-decoration:none;
}

.cart-link{
  position:relative;
  text-decoration:none;
  color:#ac1896;
  font-size:25px;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-8px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MAIN */
.main{
  display:flex;
  justify-content:center;
  padding:40px;
}

/* BOX */
.box{
  width:100%;
  max-width:400px;
  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;
  overflow:hidden;
}

.title{
  background:#ac1896;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}


/* CONTENT */
.container{
  padding:25px;
}

.form-group{
  margin-bottom:15px;
}

.form-group label{
  font-size:14px;
  font-weight:bold;
  display:block;
  margin-bottom:5px;
}

.form-group input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:4px;
}
.input-box{
  position:relative;
  width:100%;
}

.input-box input{
  width:100%;
  padding:10px 35px 10px 10px; /* space for eye icon */
  border:1px solid #a6a6a6;
  border-radius:4px;
  font-size:14px;
}

.toggle-eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#666;
}

.toggle-eye:hover{
  color:#ac1896;
}


/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  margin-top:10px;
}

button:disabled{
  background:#ccc;
}

button:not(:disabled){
  background:#ac1896;
  color:white;
}

/* FOOTER LINK */
.footer{
  margin-top:20px;
  text-align:center;
}

.link{
  color:#ac1896;
  text-decoration:none;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#f5f5dc;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.bottom-nav a{
  text-decoration:none;
  color:#ac1896;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="back-header">
  <div class="left-header">
    <a href="login.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <img src="https://i.postimg.cc/R05VcqPF/MAIN-LOGO.jpg" width="40">
    <b style="color:#ac1896;">ANU 3D Printing</b>
  </div>

  <a href="cart.html" class="cart-link">
    🛒 <span class="cart-count">0</span>
  </a>
</header>

<!-- MAIN -->
<div class="main">
  <div class="box">

    <div class="title">Forgot Password</div>

    <div class="container">

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" oninput="checkEmail()">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div class="input-box">
          <input type="password" id="password" placeholder="Enter password (Priy67@)">
          <i class="fa fa-eye toggle-eye" onclick="togglePassword('password', this)"></i>
        </div>

      <button id="sendBtn" onclick="sendMail()" disabled>
        Reset Password
      </button>


    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="bottom-nav">
  <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
  <a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
  <a href="index.html"><i class="fa-solid fa-magnifying-glass"></i>Search</a>
  <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i>Cart</a>
  <a href="contacts.html"><i class="fa-solid fa-headset"></i>Help</a>
</div>

<script>
function togglePassword(id, icon){
  let input = document.getElementById(id);
  if(input.type === "password"){
    input.type = "text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}
// ✅ ENABLE BUTTON ONLY WHEN EMAIL FILLED
function checkEmail(){
  let email = document.getElementById("email").value.trim();
  document.getElementById("sendBtn").disabled = !email;
let password = document.getElementById("password").value.trim();
  document.getElementById("sendBtn").disabled = !email;

}

// 📩 SEND RESET MAIL
async function sendMail(){

  let email = document.getElementById("email").value;

  try{
    let res = await fetch("http://localhost:8080/api/forgot-password", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({email})
    });

    let msg = await res.text();

    if(res.ok){
      alert("Reset link sent to your email ✅");
    } else {
      alert(msg || "Failed ❌");
    }

  }catch(e){
    alert("Server error ❌");
  }
}

</script>

</body>
</html>

<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: Arial;
}

/* HEADER */
.back-header{
  background:#f5f5dc;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.left-header{
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn{
  color:#201d1f;
  font-size:20px;
  text-decoration:none;
}

/* BUTTON STATES */
button:disabled {
  background:#ccc;
  cursor:not-allowed;
  opacity:0.6;
}

button:not(:disabled){
  background:#ac1896;
}

/* CART */
.cart-link{
  position:relative;
  text-decoration:none;
  color:#ac1896;
  font-size:25px;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-8px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MAIN */
.main{
  display:flex;
  justify-content:center;
  padding:40px;
}

/* LOGIN BOX */
.login-box{
  width:100%;
  max-width:400px;
  background:#fff;
  border-radius:8px;
  border:1px solid #ddd;
  overflow:hidden;
}

/* TITLE */
.login-title{
  background:#ac1896;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

/* CONTENT */
.container{
  padding:25px;
}

.form-group{
  margin-bottom:15px;
}

.form-group label{
  font-size:14px;
  font-weight:bold;
  display:block;
  margin-bottom:5px;
}

/* INPUT */
.input-box{
  position:relative;
}

.input-box input{
  width:100%;
  padding:10px 35px 10px 10px;
  border:1px solid #a6a6a6;
  border-radius:4px;
}

/* EYE ICON */
.toggle-eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#666;
}

.toggle-eye:hover{
  color:#ac1896;
}

/* EXTRA OPTIONS */
.extra{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-top:10px;
}

.extra a{
  color:#ac1896;
  text-decoration:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

/* FOOTER */
.footer{
  margin-top:20px;
  text-align:center;
}

.link{
  color:#ac1896;
  text-decoration:none;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#f5f5dc;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.bottom-nav a{
  text-decoration:none;
  color:#ac1896;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav i{
  font-size:20px;
}

input:invalid {
  border-color:red;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="back-header">
  <div class="left-header">
    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <img src="https://i.postimg.cc/R05VcqPF/MAIN-LOGO.jpg" width="40">
    <b style="color:#ac1896;">ANU 3D Printing</b>
  </div>

  <a href="cart.html" class="cart-link">
    🛒 <span class="cart-count">0</span>
  </a>
</header>

<!-- MAIN -->
<div class="main">
  <div class="login-box">

    <div class="login-title">LOGIN</div>

    <div class="container">

      <!-- FORM START -->
      <form autocomplete="off" onsubmit="event.preventDefault(); login();">

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email</label>
          <div class="input-box">
            <input type="email" id="email"
            placeholder="Enter email"
            autocomplete="off"
            oninput="checkForm()">
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <input type="password" id="password"
            placeholder="Enter password"
            autocomplete="new-password"
            oninput="checkForm()">
            <i class="fa fa-eye toggle-eye"
            onclick="togglePassword('password', this)"></i>
          </div>
        </div>

        <!-- OPTIONS -->
        <div class="extra">
          <label>
            <input type="checkbox" id="remember"> Remember me
          </label>
          <a href="forgot.html">Forgot password?</a>
        </div>

        <!-- LOGIN BUTTON -->
        <button id="loginBtn" type="submit" disabled>
          Login
        </button>

      </form>
      <!-- FORM END -->

      <div class="footer">
        New User? <a href="signup.html" class="link">Sign up</a>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="bottom-nav">
  <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
  <a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
  <a href="index.html"><i class="fa-solid fa-magnifying-glass"></i>Search</a>
  <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i>Cart</a>
  <a href="contacts.html"><i class="fa-solid fa-headset"></i>Help</a>
</div>

<script>
// 👁️ SHOW / HIDE PASSWORD
function togglePassword(id, icon){
  let input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}

// ✅ ENABLE BUTTON ONLY WHEN VALID EMAIL + PASSWORD
function checkForm(){
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let btn = document.getElementById("loginBtn");

  let emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  btn.disabled = !(emailValid && password);
}

// 🔐 LOGIN FUNCTION
async function login(){

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let remember = document.getElementById("remember").checked;
  let btn = document.getElementById("loginBtn");

  if(!email || !password){
    alert("Enter email & password");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Logging in...";

  try{
    let res = await fetch("http://localhost:8080/api/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({email, password})
    });

    let msg = await res.text();

    if(res.ok){
      alert("Login successful ✅");

      if(remember){
        localStorage.setItem("userLogin", email);
      } else {
        sessionStorage.setItem("userLogin", email);
      }

      window.location.href = "index.html";

    } else {
      alert(msg || "Login failed ❌");
    }

  }catch(e){
    alert("Server error ❌");
  }

  btn.disabled = false;
  btn.innerText = "Login";
}

// 🔓 AUTO FILL REMEMBERED EMAIL ONLY (OPTIONAL)
window.onload = function(){
  let savedUser = localStorage.getItem("userLogin");
  if(savedUser){
    document.getElementById("email").value = savedUser;
    document.getElementById("remember").checked = true;
    checkForm();
  }
}
</script>

</body>
</html>

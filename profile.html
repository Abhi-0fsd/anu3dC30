<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#eef6ff;
  padding-top:80px;
  padding-bottom:70px;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #f5f5dc;
  padding: 10px 15px;
}

.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.left-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.title-text {
  font-size: 20px;
  font-weight: bold;
  color: #ac1896;
}

/* PROFILE */
.profile-container{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.avatar-letter{
  width:150px;
  height:150px;
  border-radius:50%;
  background:#ac1896;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-weight:bold;
  margin:auto;
}

.name{
  font-size:28px;
  margin-top:15px;
}

/* BUTTON */
.btn{
  padding:10px 20px;
  background:#0077b5;
  color:white;
  border-radius:8px;
  margin:10px;
  display:inline-block;
}

/* FOOTER */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #f5f5dc;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.bottom-nav a {
  text-decoration:none;
  color:#ac1896;
  text-align:center;
}

</style>
</head>

<body>

<header>
  <div class="header-bar">
    <div class="left-group">
      <a href="index.html">
        <i class="fa-solid fa-arrow-left"></i>
      </a>

      <img src="https://i.postimg.cc/R05VcqPF/MAIN-LOGO.jpg" width="40">
      <span class="title-text">ANU 3D Printing</span>
    </div>
  </div>
</header>

<div class="profile-container">

<div id="avatar"></div>

<div class="name" id="userName">Guest</div>
<div id="userEmail" style="color:gray;"></div>

<div>
<span class="btn">Frame</span>
<span class="btn">Keychain</span>
<span class="btn">Toys</span>
</div>

<div style="margin-top:20px;">
📞 +91 94442 10661 <br>
📩 anu.3dprints@gmail.com
</div>

</div>

<!-- FOOTER -->
<div class="bottom-nav">
<a href="index.html"><i class="fa fa-home"></i><br>Home</a>
<a href="profile.html"><i class="fa fa-user"></i><br>Profile</a>
<a href="#"><i class="fa fa-search"></i><br>Search</a>
<a href="cart.html"><i class="fa fa-cart-shopping"></i><br>Cart</a>
<a href="#"><i class="fa fa-circle-question"></i><br>Help</a>
</div>

<script>

// LOAD USER DATA
let user = JSON.parse(localStorage.getItem("user"));

if(user){

  document.getElementById("userName").innerText = user.name;
  document.getElementById("userEmail").innerText = user.email;

  let firstLetter = user.email.charAt(0).toUpperCase();

  document.getElementById("avatar").innerHTML =
    `<div class="avatar-letter">${firstLetter}</div>`;

}else{
  // IF NOT LOGIN
  alert("Please Login First");
  window.location.href = "login.html";
}

</script>

</body>
</html>

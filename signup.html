<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: Arial;
}

/* HEADER */
.back-header{
  background:#f5f5dc;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.left-header{
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn{
  color:#201d1f;
  font-size:20px;
  text-decoration:none;
}

.cart-link{
  position:relative;
  text-decoration:none;
  color:#ac1896;
  font-size:25px;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-8px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MAIN */
.main{
  display:flex;
  justify-content:center;
  padding:40px;
}

/* LOGIN BOX */
.login-box{
  width:100%;
  max-width:400px;
  background:#fff;
  border-radius:8px;
  border:1px solid #ddd;
  overflow:hidden;
}

/* TOP TITLE BAR */
.login-title{
  background:#ac1896;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

/* CONTENT */
.container{
  padding:25px;
}

/* FORM */
.form-group{
  margin-bottom:15px;
}

.form-group label{
  font-size:14px;
  font-weight:bold;
  display:block;
  margin-bottom:5px;
}
.input-box{
  position:relative;
  width:100%;
}

.input-box input{
  width:100%;
  padding:10px 35px 10px 10px; /* space for eye icon */
  border:1px solid #a6a6a6;
  border-radius:4px;
  font-size:14px;
}

.toggle-eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#666;
}

.toggle-eye:hover{
  color:#ac1896;
}

.form-group input{
  width:100%;
  padding:10px;
  border:1px solid #a6a6a6;
  border-radius:4px;
  font-size:14px;
}

.form-group input:focus{
  border-color:#ac1896;
  box-shadow:0 0 3px #ac1896;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#ac1896;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
  font-size:15px;
}

button:hover{
  background:#8f1277;
}

/* SMALL TEXT */
.small{
  font-size:12px;
  color:#555;
  margin-top:10px;
}

/* FOOTER LINK */
.footer{
  margin-top:20px;
  font-size:14px;
  text-align:center;
}

.link{
  color:#ac1896;
  text-decoration:none;
}

.link:hover{
  text-decoration:underline;
}

/* FOOTER NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#f5f5dc;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.bottom-nav a{
  text-decoration:none;
  color:#ac1896;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav i{
  font-size:20px;
}
</style>
</head>

<body>

<header class="back-header">
  <div class="left-header">
    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <img src="https://i.postimg.cc/R05VcqPF/MAIN-LOGO.jpg" width="40">
    <b style="color:#ac1896;">ANU 3D Printing</b>
  </div>

  <a href="cart.html" class="cart-link">
    🛒 <span class="cart-count">0</span>
  </a>
</header>

<div class="main">
  <div class="login-box">

    <!-- TOP BAR -->
    <div class="login-title">Create Account</div>

    <div class="container">

      <div class="form-group">
        <label>Your name</label>
        <input type="text" id="name" placeholder="First and last name">
      </div>

      <div class="form-group">
        <label>Mobile number</label>
        <input type="text" id="phone" placeholder="10-digit number">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email">
      </div>

        <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-box">
          <input type="password" id="password" placeholder="Enter password">
          <i class="fa fa-eye toggle-eye" onclick="togglePassword('password', this)"></i>
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label>Re-enter password</label>
        <div class="input-box">
          <input type="password" id="confirmPassword" placeholder="Re-enter password">
          <i class="fa fa-eye toggle-eye" onclick="togglePassword('confirmPassword', this)"></i>
        </div>
      </div>


      <button onclick="signup()">Create your account</button>

      <p class="small">
        By creating an account, you agree to ANU 3D Printing Conditions of Use.
      </p>

      <div class="footer">
        Already have an account?
        <a href="login.html" class="link">Log in</a>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="bottom-nav">
  <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
  <a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
  <a href="index.html"><i class="fa-solid fa-magnifying-glass"></i>Search</a>
  <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i>Cart</a>
  <a href="contacts.html"><i class="fa-solid fa-headset"></i>Help</a>
</div>
<script>
// 👁️ SHOW / HIDE PASSWORD
function togglePassword(fieldId, icon){
  let input = document.getElementById(fieldId);

  if(input.type === "password"){
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}


// ✅ SIGNUP FUNCTION
async function signup(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;
  let confirmPassword = document.getElementById("confirmPassword").value;

  // validation
  if(!name || !phone || !email || !password || !confirmPassword){
    alert("Please fill all fields");
    return;
  }

  if(password !== confirmPassword){
    alert("Passwords do not match ❌");
    return;
  }

  try{
    let res = await fetch("http://localhost:8080/api/signup", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({name, phone, email, password})
    });

    let msg = await res.text();

    if(res.ok){
      alert("Signup successful ✅");

      // redirect AFTER clicking OK
      window.location.href = "login.html";

    } else {
      alert(msg || "Signup failed ❌");
    }

  }catch(e){
    console.error(e);
    alert("Signup Successfully ✅");
  }
}
</script>
    
</body>
</html>

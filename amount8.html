<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Keychain</title>
<link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
   margin:0;
  font-family:Arial;
  background:#eef6ff;
  padding-bottom: 55px; 
}
 header {
      background: #f5f5dc;
      padding: 15px 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,.1);
    }

    .back-header {
      display: flex;
      align-items: center;
      gap: 20px; /* spacing */
    }

    .back-btn {
      text-decoration: none;
      color: #201d1f; /* 🔥 arrow color */
      font-size: 20px;
    }

    .title-text {
      font-size: 22px;
      font-weight: bold;
      color: #ac1896; /* 🔥 text color */
    }

.page-wrapper{
  max-width:1800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.1);
}

.container{
  display:flex;
  gap:35px;
}

.left-section{
  display:flex;
  gap:5px;
  width:60%;
}

.thumb-column{
  width:150px;
  display:flex;
  flex-direction:column;
  gap:38px;
  margin-left:40px;
}

.thumb, .video-thumb video{
  width:100%;
  height:140px;
  border-radius:12px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
  transition:.3s;
}

.thumb:hover,
.thumb.active,
.video-thumb.active video{
  border-color:#0099ff;
  transform:scale(1.05);
}

.main-media{
  width:92%;
  height:750px;
  border-radius:18px;
  margin-left:80px;
  box-shadow:10px 5px 15px rgba(0,0,0,.2);
  object-fit:cover;
}

.video-thumb{
  position:relative;
  cursor:pointer;
}

.play-icon{
  position:absolute;
  top:40px;
  left:40px;
  width:40px;
  height:40px;
  background:rgba(0,0,0,0.55);
  border-radius:50%;
  color:#fff;
  text-align:center;
  line-height:40px;
  font-size:22px;
  pointer-events:none;
}

.right{ flex:5; }

.product-title{
  font-size:40px;
  font-weight:bold;
  margin-left: 25px;
}

.final-price{
  font-size:40px;
  font-weight:700;
  color:#1b1a1b;
  margin-bottom:9px;
  margin-left: 50px;
}

.sub-price-line{
  margin-top:2px;
  font-size:25px;
  margin-left: 50px;
}

.old-price{
  text-decoration:line-through;
  color:#777;
}

.discount{
  color:#1fbf4a;
  font-weight:bold;
  margin-left:10px;
  font-size:20px;
}

.features{
  margin:20px 0;
  font-size:18px;
  line-height:1.8;
  margin-left: 50px;
}

/* BUTTONS */
.btn-row{
  display:flex;
  gap:20px;
  margin-left: 10px;
}

.button{
  width:180px;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
}

.buy{ background:#ff9800; }
.cart{ background:#1fbf4a; }
/* FOOTER NAVBAR */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #f5f5dc;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
}


.bottom-nav a {
  text-decoration: none;
  color: #ac1896;
  font-size: 14px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.bottom-nav i {
  font-size: 20px;
}

@media(max-width:768px){
  .container{ flex-direction:column; }
  .left-section{ width:100%; flex-direction:column; align-items:center; }
  .thumb-column{ flex-direction:row; width:100%; overflow-x:auto; }
  .thumb, .video-thumb video{ width:70px; height:90px; }
  .main-media{ width:100%; margin-left:0; height:auto; }
}
</style>
<footer>
 <div class="bottom-nav">

   <a href="index.html">
      <i class="fa-solid fa-house"></i>
      Home
    </a>

     <a href="profile.html">
      <i class="fa-solid fa-user"></i>
      Profile
    </a>

    <a href="index.html">
      <i class="fa-solid fa-magnifying-glass"></i>
      Search
    </a>

   <a href="cart.html">
      <i class="fa-solid fa-cart-shopping"></i>
      Cart
    </a>

    <a href="contacts.html">
      <i class="fa-solid fa-headset"></i>
      Help
    </a>

  </div>
</footer>
<script>
const videoUrl = "https://res.cloudinary.com/drdonj3dp/video/upload/v1770991023/WhatsApp_Video_2025-12-26_at_4.21.50_PM_rhs4qy.mp4";

function changeImg(src, isVideo = false, event = null){

  const box = document.getElementById("mainBox");

  if(isVideo){
    box.innerHTML = `
      <video class="main-media" controls autoplay muted>
        <source src="${videoUrl}" type="video/mp4">
      </video>
    `;
  } else {
    box.innerHTML = `<img src="${src}" class="main-media">`;
  }

  document.querySelectorAll(".thumb, .video-thumb").forEach(t=>t.classList.remove("active"));
  if(event) event.currentTarget.classList.add("active");
}

const productData = { name: "Name Keychain", mrp: 65, current: 49};
const discountPercent = Math.round(((productData.mrp - productData.current) / productData.mrp) * 100);

window.onload = () => {
  document.getElementById("title").textContent = productData.name;
  document.getElementById("current").textContent = productData.current;
  document.getElementById("mrp").textContent = productData.mrp;
  document.getElementById("discount").textContent = discountPercent;
}
</script>
</head>

<body>
 <header>
  <div class="back-header">
    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <!-- LOGO + TEXT -->
  <div style="display:flex; align-items:center; gap:10px;">
    
    <!-- IMAGE ICON -->
    <img src="https://i.postimg.cc/R05VcqPF/MAIN-LOGO.jpg" alt="Logo" style="width:40px; height:40px; object-fit:contain;">

    <span class="title-text">ANU 3D Printing</span>
    
    
  </div>
</header>

<div class="page-wrapper">
  <div class="container">

    <div class="left-section">

      <div class="thumb-column">

        <img class="thumb active"
        src="https://i.postimg.cc/8zNwYNwz/IMG-20260113-115730-jpg.jpg"
        onclick="changeImg(this.src,false,event)">

        <img class="thumb"
        src="https://i.postimg.cc/T1JPwVbt/IMG-20260131-161125-jpg.jpg"
        onclick="changeImg(this.src,false,event)">

        <img class="thumb"
        src="https://i.postimg.cc/fbVQFcRN/IMG-20260131-161221-jpg.jpg"
        onclick="changeImg(this.src,false,event)">

        <div class="video-thumb" onclick="changeImg('',true,event)">
          <video class="thumb" muted>
            <source src="https://res.cloudinary.com/dn6jinwi6/video/upload/v1770293935/video_20260205_174255_edit_bmvrw1.mp4">
          </video>
          <div class="play-icon">▶</div>
        </div>

      </div>

      <div style="flex:1" id="mainBox">
        <img src="https://i.postimg.cc/8zNwYNwz/IMG-20260113-115730-jpg.jpg" class="main-media">
      </div>

    </div>

    <div class="right">

      <h2 class="product-title" id="title"></h2>

      <div class="final-price">₹<span id="current"></span></div>

      <div class="sub-price-line">
        <span class="old-price">₹<span id="mrp"></span></span>
        <span class="discount">( <span id="discount"></span>% OFF )</span>
      </div>

      <p class="features">
        ✓ Perfect for Couples & Gifts<br>
        ✓ Beautiful Warm Lighting<br>
        ✓ Engraved Forever Memory
      </p>

     
 <div class="btn-row">
        <a href="am8.html" class="button buy">Buy Now</a>
        <a href="cart.html" class="button cart">Add to Cart</a><br><br>
      </div>
    </div>

  </div>
</div>

</body>
</html>
